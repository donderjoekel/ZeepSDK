name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to build (e.g. 2.3.0 or v2.3.0-beta.1). Required for manual runs.
        required: true
      dry_run:
        description: Skip mod.io upload and attach the zip as a workflow artifact instead
        type: boolean
        default: true

permissions:
  contents: write

env:
  GAME_ID: 3213
  MOD_ID: 3082296

jobs:
  build:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        uses: ./.github/actions/extract-release-version
        with:
          tag_name: ${{ github.event.release.tag_name }}
          version_input: ${{ github.event.inputs.version }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Detect csproj
        id: csproj
        uses: ./.github/actions/detect-csproj

      - name: Set CSProj Version
        uses: KageKirin/set-csproj-version@v1.0.0
        with:
          file: ${{ steps.csproj.outputs.csproj_path }}
          version: ${{ env.VERSION }}

      - name: Publish
        run: dotnet publish "${{ steps.csproj.outputs.csproj_path }}" -c Release --artifacts-path "C:\out" /p:BugsnagKey="${{ secrets.BUGSNAG_KEY }}"

      - name: Verify publish output
        shell: pwsh
        run: |
          $src = "C:\out\publish\${{ steps.csproj.outputs.csproj_name }}\release"
          if (-not (Test-Path $src)) {
            throw "Publish output not found: $src"
          }
          Get-ChildItem $src | Format-Table Name, Length
          $dll = Join-Path $src "${{ steps.csproj.outputs.csproj_name }}.dll"
          $pdb = Join-Path $src "${{ steps.csproj.outputs.csproj_name }}.pdb"
          if (-not (Test-Path $dll)) { throw "DLL not found: $dll" }
          if (-not (Test-Path $pdb)) { throw "Portable PDB not found: $pdb" }

      - name: Zip build
        shell: pwsh
        run: |
          $src = "C:\out\publish\${{ steps.csproj.outputs.csproj_name }}\release"
          $dst = "C:\out\build-${{ env.VERSION }}.zip"
          if (Test-Path $dst) { Remove-Item $dst -Force }
          Compress-Archive -Path "$src\*" -DestinationPath $dst -Force

      - name: Upload build artifact (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ env.VERSION }}
          path: C:\out\build-${{ env.VERSION }}.zip

      - name: Upload zip to pre-release
        if: github.event_name == 'release' && github.event.release.prerelease
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "C:\out\build-${{ env.VERSION }}.zip" --clobber

      - name: Upload mod to mod.io
        if: (github.event_name == 'workflow_dispatch' && !inputs.dry_run) || (github.event_name == 'release' && !github.event.release.prerelease)
        uses: Thundernerd/upload-mod-to-modio@v1.0.0
        with:
          bearer-token: ${{ secrets.MODIO_BEARER }}
          game-id: ${{ env.GAME_ID }}
          mod-id: ${{ env.MOD_ID }}
          active: true
          changelog: ${{ github.event.release.body }}
          file-path: 'C:\out\build-${{ env.VERSION }}.zip'
          version: ${{ env.VERSION }}
